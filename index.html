<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shan Young Family Tree</title>
</head>
<body>
  <!-- View-password gate — blocks the whole app until the correct password is entered -->
  <div id="view-gate" class="view-gate">
    <div class="view-gate-box">
      <h2>Shan Young Family Tree</h2>
      <p>Enter the family password to view.</p>
      <form id="view-gate-form">
        <input type="password" id="view-gate-password" placeholder="Password" required autofocus />
        <button type="submit">View Tree</button>
      </form>
      <p id="view-gate-error" class="error hidden"></p>
    </div>
  </div>

  <div id="app" class="hidden">
    <header class="toolbar">
      <h1>Shan Young Family Tree</h1>

      <div class="toolbar-controls">
        <!-- Lineage toggle: switches which parent set is rendered for people
             who have both a biological and an adoptive lineage recorded -->
        <div class="lineage-toggle">
          <span>View lineage:</span>
          <button id="btn-bio" class="toggle-btn active" data-mode="bio">Biological</button>
          <button id="btn-adoptive" class="toggle-btn" data-mode="adoptive">Adoptive</button>
        </div>

        <button id="btn-reset-view" class="edit-mode-btn">Reset View</button>
        <select id="jump-to-person" class="jump-to-person">
          <option value="">Jump to person…</option>
        </select>
        <button id="btn-edit-mode" class="edit-mode-btn">Edit mode: Off</button>
        <button id="btn-add-person" class="add-person-btn hidden">+ Add Person</button>
        <a href="/admin.html" class="admin-link">Admin</a>
      </div>
    </header>

    <p id="status-banner" class="status-banner hidden"></p>

    <div class="chart-area">
      <div id="FamilyChart" class="f3"></div>

      <!-- Person detail side panel — docked, opens when a card is clicked -->
      <div id="side-panel" class="side-panel hidden">
        <div id="side-panel-resize-handle" class="side-panel-resize-handle"></div>
        <button id="side-panel-close" class="side-panel-close">&times;</button>
        <img id="side-panel-avatar" class="side-panel-avatar hidden" alt="" />
        <h2 id="side-panel-title"></h2>
        <p id="side-panel-identity" class="side-panel-meta"></p>
        <p id="side-panel-birthday" class="side-panel-meta"></p>
        <div id="side-panel-desc" class="side-panel-desc"></div>
        <div class="gallery-scroll" id="side-panel-photos"></div>
      </div>

      <!-- Add / Edit person panel — same docked style as the description panel -->
      <div id="edit-modal" class="side-panel hidden">
        <div id="edit-modal-resize-handle" class="side-panel-resize-handle"></div>
        <button id="edit-close" class="side-panel-close">&times;</button>
        <h2 id="edit-modal-title"></h2>
        <form id="edit-form">
          <div class="lineage-parent-fields">
            <p class="relation-fields-label">Biological parent(s) — up to 2, for the lineage toggle</p>
            <div class="lineage-parent-row">
              <select id="field-bio-parent-1"><option value="">— none —</option></select>
              <select id="field-bio-parent-2"><option value="">— none —</option></select>
            </div>
            <p class="relation-fields-label">Adoptive parent(s) — up to 2, for the lineage toggle</p>
            <div class="lineage-parent-row">
              <select id="field-adoptive-parent-1"><option value="">— none —</option></select>
              <select id="field-adoptive-parent-2"><option value="">— none —</option></select>
            </div>
          </div>

          <div id="relation-fields" class="relation-fields-section">
            <p class="relation-fields-label">Spouse(s) — use the Biological/Adoptive parent fields below for parent-child links</p>
            <div id="relations-list"></div>
            <button type="button" id="add-relation-row-btn">+ Add spouse</button>
          </div>

          <label>First name <input type="text" id="field-first-name" required /></label>
          <label>Last name <input type="text" id="field-last-name" /></label>
          <label>Birthday <input type="text" id="field-birthday" placeholder="e.g. 1985 or 1985-04-02" /></label>
          <label>Gender (for layout only)
            <select id="field-gender">
              <option value="M">M</option>
              <option value="F">F</option>
            </select>
          </label>
          <label>Gender identity (shown on card) <input type="text" id="field-gender-identity" placeholder="e.g. Woman, Man, Non-binary" /></label>
          <label>Description
            <textarea id="field-description" rows="5"></textarea>
            <span class="field-hint">Markdown supported: **bold**, *italic*, - lists, [links](url)</span>
          </label>

          <div class="photo-field">
            <label>Avatar photo (shown on the card)
              <input type="file" id="field-avatar" accept="image/*" />
            </label>
            <div id="existing-avatar" class="existing-photos"></div>
          </div>

          <div class="photo-field">
            <label>Add gallery photos <input type="file" id="field-photos" accept="image/*" multiple /></label>
            <div id="existing-photos" class="existing-photos"></div>
            <div id="staged-photos" class="staged-photos"></div>
          </div>

          <label>Your name (optional, so the admin knows who submitted this) <input type="text" id="field-submitted-by" /></label>

          <div class="form-actions">
            <button type="button" id="edit-delete-btn" class="delete-btn hidden">Delete Person</button>
            <button type="submit" id="edit-submit-btn">Submit</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
