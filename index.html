<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Family Tree</title>
</head>
<body>
  <div id="app">
    <header class="toolbar">
      <h1>Our Family Tree</h1>

      <!-- Lineage toggle: switches which parent set is rendered for people
           who have both a biological and an adoptive lineage recorded -->
      <div class="lineage-toggle">
        <span>View lineage:</span>
        <button id="btn-bio" class="toggle-btn active" data-mode="bio">Biological</button>
        <button id="btn-adoptive" class="toggle-btn" data-mode="adoptive">Adoptive</button>
      </div>
    </header>

    <div id="FamilyChart" class="f3"></div>

    <!-- Photo gallery modal, opened from the custom card's "View Photos" button -->
    <div id="gallery-modal" class="gallery-modal hidden">
      <div class="gallery-modal-content">
        <button id="gallery-close" class="gallery-close">&times;</button>
        <h2 id="gallery-title"></h2>
        <p id="gallery-desc"></p>
        <div class="gallery-scroll" id="gallery-scroll"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
